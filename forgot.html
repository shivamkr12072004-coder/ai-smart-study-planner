<!DOCTYPE html>
<html>

<title>

</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>
❓ Reset Password
</h1>

<form method="POST">

name="username"
placeholder="Enter Username"

<input type="password"
name="password"
placeholder="Enter New Password"
required>

<br><br>

<button type="submit">

🔒 Reset Password

</button>

</form>

<br><br>

<a href="/login">

<button>

🔙 Back Login

</button>

</a>

</div>

</body>

</html>
