<!DOCTYPE html>
<html>

<head>

    <title>Study Notes</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>
            📝 Study Notes / Diary
        </h1>

        <p>
            Write your important study notes below 😄
        </p>

        <form method="POST">

            <textarea
            name="content"
            rows="8"
            cols="40"
            placeholder="Write your study notes here..."
            required>
            </textarea>

            <br><br>

            <button type="submit">
                💾 Save Notes
            </button>

        </form>

        <hr>

        <h2>
            📚 Saved Notes
        </h2>

        {% for note in notes %}

        <div class="box">

            <p>
                {{ note.content }}
            </p>

        </div>

        {% endfor %}

        <br>

        <a href="/dashboard">

            <button>
                🔙 Back Dashboard
            </button>

        </a>

    </div>

</body>

</html>
